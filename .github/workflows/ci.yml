name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage gate (≥ 75% total statement coverage)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep '^total:' \
            | awk '{print $3}' \
            | sed 's/%//')
          echo "Total statement coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN {
            if (c+0 < 75) {
              print "FAIL: coverage " c "% is below 75% threshold"
              exit 1
            }
          }'

      - name: Binary size gate (< 20 MB)
        run: |
          go build -ldflags "-s -w -X github.com/jgiornazi/meshaudit/cmd.Version=ci" -o meshaudit_ci .
          SIZE=$(du -k meshaudit_ci | awk '{print $1}')
          echo "Binary size: ${SIZE} KB"
          awk -v s="$SIZE" 'BEGIN { if (s+0 > 20480) { print "FAIL: binary " s "KB exceeds 20MB limit"; exit 1 } }'
          rm meshaudit_ci

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...
